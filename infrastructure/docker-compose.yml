version: "3.9"

services:
  # ---------------------------------------------------
  # Django API (Gunicorn)
  # ---------------------------------------------------
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
    image: safex-api:latest
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media

  # ---------------------------------------------------
  # Celery worker
  # ---------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.celery
    image: safex-worker:latest
    env_file:
      - .env
    command: celery -A config.celery worker -l info
    depends_on:
      - api
    restart: unless-stopped

  # ---------------------------------------------------
  # Celery beat (periodic tasks)
  # ---------------------------------------------------
  beat:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.celery
    image: safex-beat:latest
    env_file:
      - .env
    command: celery -A config.celery beat -l info
    depends_on:
      - api
    restart: unless-stopped

  # ---------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-dashboard_db}
      POSTGRES_USER: ${DB_USER:-dashboard_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:-dashboard_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------
  # Redis – broker + cache
  # ---------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------
  # Nginx reverse‑proxy
  # ---------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/static:ro
      - media_volume:/app/media:ro
    restart: unless-stopped

volumes:
  pg_data:
  static_volume:
  media_volume:
