events { worker_connections 1024; }

http {
    upstream django {
        server api:8000;
    }

    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;

    server {
        listen 80;
        # Since we are testing locally we'll skip ssl enforcement on local for now, but keeping the roadmap config
        # We'll just leave it as is, but we might get issues if certs don't exist.
        # Actually I will comment out SSL so we can verify locally on port 80.
        server_name _;

        location /static/ {
            alias /static/;
            expires 30d;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://django;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
